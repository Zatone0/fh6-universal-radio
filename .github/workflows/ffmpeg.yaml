name: ffmpeg

# BtbN ships ffmpeg only as a zip, and the mod's DependencyManager can't unzip
# under Wine (no System32\tar.exe). So we mirror a bare ffmpeg.exe to the `deps`
# release; the DependencyManager downloads it straight from there on first run.
# The win64-gpl build is static, so the lone exe is self-contained.
# Runs weekly to track BtbN's floating `latest`, or on demand from the Actions tab.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and extract ffmpeg.exe
        run: |
          curl -fsSL -o ffmpeg.zip \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          unzip -j ffmpeg.zip '*/bin/ffmpeg.exe' -d .
          test -f ffmpeg.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg
          path: ffmpeg.exe

      - name: Publish to deps release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deps
          name: Provider dependencies
          files: ffmpeg.exe
